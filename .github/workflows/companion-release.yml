name: Companion release

on:
  workflow_dispatch:
  push:
    tags:
      - "companion-v*"

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: companion/package-lock.json
      - name: Install and build Mac
        working-directory: companion
        run: |
          npm ci
          npm run dist:mac
      - uses: actions/upload-artifact@v4
        with:
          name: companion-mac
          path: |
            companion/dist/*.dmg
            companion/dist/*.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: companion/package-lock.json
      - name: Install and build Windows
        working-directory: companion
        run: |
          npm ci
          npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: companion-win
          path: companion/dist/*.exe

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/companion-v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.exe' \) -exec cp {} release-assets/ \;
          ls -la release-assets/
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
