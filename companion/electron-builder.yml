appId: com.promptlylabs.companion
productName: Promptly Companion
copyright: Copyright © Promptly Labs
directories:
  output: dist
  buildResources: build
files:
  - src/**/*
  - package.json
extraMetadata:
  main: src/main.js
artifactName: Promptly-Companion-${version}-${os}.${ext}
mac:
  category: public.app-category.productivity
  extendInfo:
    CFBundleName: Promptly
    NSMicrophoneUsageDescription: Promptly Companion uses the microphone for dictation when writing prompts.
  target:
    - dmg
    - zip
  icon: build/icon.png
  # Unsigned — electron-builder skips formal signing when identity is null.
  identity: null
  gatekeeperAssess: false
  hardenedRuntime: false
afterPack: ./scripts/after-pack.cjs
dmg:
  title: Promptly Companion
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
    - x: 280
      y: 120
      type: file
      path: build/INSTALL.txt
win:
  target:
    - nsis
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: Promptly Companion
linux:
  target:
    - AppImage
  icon: build/icon.png
  category: Utility
