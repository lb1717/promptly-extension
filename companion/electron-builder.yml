appId: com.promptlylabs.companion
productName: Promptly Companion
copyright: Copyright © Promptly Labs
directories:
  output: dist
  buildResources: build
files:
  - src/**/*
  - package.json
extraMetadata:
  main: src/main.js
artifactName: Promptly-Companion-${version}-${os}.${ext}
mac:
  category: public.app-category.productivity
  extendInfo:
    CFBundleName: Promptly
    CFBundleDisplayName: Promptly Companion
    LSUIElement: false
    NSMicrophoneUsageDescription: Promptly Companion uses the microphone for dictation when writing prompts.
  target:
    - dmg
    - zip
  icon: build/icon.png
  # Unsigned — electron-builder skips formal signing when identity is null.
  identity: null
  gatekeeperAssess: false
  hardenedRuntime: false
afterPack: ./scripts/after-pack.cjs
dmg:
  title: Promptly Companion
  iconSize: 96
  window:
    width: 660
    height: 320
  background: build/dmg-background.png
  contents:
    - x: 170
      y: 155
    - x: 470
      y: 155
      type: link
      path: /Applications
    - x: 330
      y: 292
      type: file
      path: build/Install command.txt
win:
  target:
    - nsis
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: Promptly Companion
linux:
  target:
    - AppImage
  icon: build/icon.png
  category: Utility
