appId: com.promptlylabs.companion
productName: Promptly Companion
copyright: Copyright © Promptly Labs
directories:
  output: dist
  buildResources: build
files:
  - src/**/*
  - package.json
extraMetadata:
  main: src/main.js
artifactName: Promptly-Companion-${version}-${os}.${ext}
mac:
  category: public.app-category.productivity
  extendInfo:
    CFBundleName: Promptly
    NSMicrophoneUsageDescription: Promptly Companion uses the microphone for dictation when writing prompts.
  target:
    - dmg
    - zip
  icon: build/icon.png
  # Unsigned distribution — ad-hoc signed in scripts/after-pack.cjs after pack.
  # Users: if macOS says "damaged", run: xattr -cr "/Applications/Promptly Companion.app"
  identity: null
  gatekeeperAssess: false
  hardenedRuntime: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
afterPack: ./scripts/after-pack.cjs
dmg:
  title: Promptly Companion
win:
  target:
    - nsis
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: Promptly Companion
linux:
  target:
    - AppImage
  icon: build/icon.png
  category: Utility
